<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Session Canvas Webview Harness</title>
    <link rel="stylesheet" href="../../../dist/webview.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (() => {
        const postedMessages = [];
        let persistedState = window.__devSessionCanvasHarnessInitialPersistedState ?? {};

        window.acquireVsCodeApi = function acquireVsCodeApi() {
          return {
            getState() {
              return persistedState;
            },
            setState(nextState) {
              persistedState = nextState;
            },
            postMessage(message) {
              postedMessages.push(message);
              if (message?.type === 'webview/resolveExecutionFileLinks') {
                const resolvedLinks = Array.isArray(message.payload?.candidates)
                  ? message.payload.candidates.map((candidate) => ({
                      candidateId: candidate.candidateId,
                      link: {
                        linkKind: 'file',
                        text: candidate.text,
                        path: candidate.path,
                        line: candidate.line,
                        column: candidate.column,
                        lineEnd: candidate.lineEnd,
                        columnEnd: candidate.columnEnd,
                        resolvedId: `harness-${candidate.candidateId}`,
                        targetKind: 'file'
                      }
                    }))
                  : [];
                window.postMessage(
                  {
                    type: 'host/executionFileLinksResolved',
                    payload: {
                      requestId: message.payload?.requestId,
                      nodeId: message.payload?.nodeId,
                      kind: message.payload?.kind,
                      resolvedLinks
                    }
                  },
                  '*'
                );
              }
              window.dispatchEvent(
                new CustomEvent('dev-session-canvas:harness-post-message', {
                  detail: message
                })
              );
            }
          };
        };

        window.__devSessionCanvasHarness = {
          dispatchHostMessage(message) {
            window.postMessage(message, '*');
          },
          bootstrap(
            state,
            runtime = { workspaceTrusted: true, surfaceLocation: 'panel', defaultAgentProvider: 'codex', terminalScrollback: 1000, editorMultiCursorModifier: 'alt' }
          ) {
            this.dispatchHostMessage({
              type: 'host/bootstrap',
              payload: {
                state,
                runtime
              }
            });
          },
          update(
            state,
            runtime = { workspaceTrusted: true, surfaceLocation: 'panel', defaultAgentProvider: 'codex', terminalScrollback: 1000, editorMultiCursorModifier: 'alt' }
          ) {
            this.dispatchHostMessage({
              type: 'host/stateUpdated',
              payload: {
                state,
                runtime
              }
            });
          },
          getPostedMessages() {
            return postedMessages.slice();
          },
          clearPostedMessages() {
            postedMessages.length = 0;
          },
          getPersistedState() {
            return persistedState;
          }
        };
      })();
    </script>
    <script src="../../../dist/webview.js"></script>
  </body>
</html>
