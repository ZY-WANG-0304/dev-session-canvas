<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Session Canvas Webview Harness</title>
    <link rel="stylesheet" href="../../../dist/webview.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (() => {
        const postedMessages = [];
        let persistedState = {};

        window.acquireVsCodeApi = function acquireVsCodeApi() {
          return {
            getState() {
              return persistedState;
            },
            setState(nextState) {
              persistedState = nextState;
            },
            postMessage(message) {
              postedMessages.push(message);
              window.dispatchEvent(
                new CustomEvent('dev-session-canvas:harness-post-message', {
                  detail: message
                })
              );
            }
          };
        };

        window.__devSessionCanvasHarness = {
          dispatchHostMessage(message) {
            window.postMessage(message, '*');
          },
          bootstrap(state, runtime = { workspaceTrusted: true }) {
            this.dispatchHostMessage({
              type: 'host/bootstrap',
              payload: {
                state,
                runtime
              }
            });
          },
          update(state, runtime = { workspaceTrusted: true }) {
            this.dispatchHostMessage({
              type: 'host/stateUpdated',
              payload: {
                state,
                runtime
              }
            });
          },
          getPostedMessages() {
            return postedMessages.slice();
          },
          clearPostedMessages() {
            postedMessages.length = 0;
          },
          getPersistedState() {
            return persistedState;
          }
        };
      })();
    </script>
    <script src="../../../dist/webview.js"></script>
  </body>
</html>
